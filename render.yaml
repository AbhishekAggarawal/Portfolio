# ── Render Blueprint ────────────────────────────────────────────────────────
# Deploy ChromaDB on Render for vector search (OPTIONAL — Path B only).
#
# ⚠️  FREE TIER DOES NOT SUPPORT PERSISTENT DISKS.
#     You MUST use the "starter" plan ($7/mo) or this will fail with:
#     "services[0] disks are not supported for free tier services"
#
# THE FREE PATH (recommended):
#     Skip this entire file. Deploy ONLY on Vercel with GROQ_API_KEY.
#     The chatbot works without ChromaDB — it uses keyword + synonym + intent
#     matching against 53 baseKnowledge docs compiled into the app bundle.
#     See RAG_DEPLOYMENT.md for the 5-minute, $0/month setup.
#
# IF YOU WANT VECTOR SEARCH:
#     Change `plan` below to "starter", then:
#     1. https://render.com → "New" → "Blueprint" → connect your GitHub repo
#     2. Render auto-detects this file and creates the ChromaDB service + disk
#     3. After ~2 min, copy the .onrender.com URL into your Vercel env vars:
#        CHROMA_URL, EMBEDDING_API_KEY, EMBEDDING_API_URL, EMBEDDING_MODEL
#     4. Run: npx tsx scripts/ingest-cloud.ts
#
# NOTE: Starter plan eliminates cold starts. Free tier (if disks were supported)
#       would have 15-30s cold starts — the RAG pipeline handles this via
#       AbortController timeouts and keyword fallback.
# ───────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: abhishek-chromadb
    runtime: image
    image:
      url: chromadb/chroma:latest
    envVars:
      - key: IS_PERSISTENT
        value: "TRUE"
      - key: PERSIST_DIRECTORY
        value: /chroma/data
      - key: CHROMA_SERVER_AUTHN_CREDENTIALS
        value: ""  # Set a token value here if you want auth
      - key: CHROMA_SERVER_AUTHN_PROVIDER
        value: ""  # Set "token" if you added credentials above
      - key: CHROMA_SERVER_CORS_ALLOW_ORIGINS
        value: '["*"]'  # Allow requests from Vercel
    disk:
      name: chroma-storage
      mountPath: /chroma/data
      sizeGB: 1  # Increase if portfolio data grows beyond 1 GB
    healthCheckPath: /api/v1/heartbeat
    plan: starter  # ⚠️ Required — free tier does NOT support disks